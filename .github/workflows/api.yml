name: API — Spring Boot CI

on:
  push:
    branches: [main]
    paths: ['api/**']
  pull_request:
    branches: [main]
    paths: ['api/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tunetogether_test
          POSTGRES_USER: tunetogether
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tunetogether"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        working-directory: api
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tunetogether_test
          SPRING_DATASOURCE_USERNAME: tunetogether
          SPRING_DATASOURCE_PASSWORD: test_password
          JWT_SECRET: ci-test-secret-key-must-be-at-least-32-characters
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: api/target/surefire-reports/
