spring:
  application:
    name: tunetogether-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tunetogether}
    username: ${SPRING_DATASOURCE_USERNAME:tunetogether}
    password: ${SPRING_DATASOURCE_PASSWORD:tunetogether_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars!!}
  expiration-ms: 86400000  # 24 hours
